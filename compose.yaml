name: villains-club

services:
  dev:
    build:
      context: .
      dockerfile: .devcontainer/Dockerfile
    init: true
    user: node
    volumes:
      - .:/workspaces/TheVillainsClub:cached
    working_dir: /workspaces/TheVillainsClub
    ports:
      - "5173:5173"
    environment:
      NODE_ENV: development
      ELECTRON_DISABLE_GPU: "1"
    tty: true
    stdin_open: true
    command: sleep infinity
